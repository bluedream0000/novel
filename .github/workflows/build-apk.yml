name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip openjdk-17-jdk autoconf automake libtool pkg-config libncurses5-dev libncursesw5-dev libltdl-dev libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev libgl1-mesa-dev libx11-dev libxext-dev libxrender-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libpulse-dev cmake git
      
      - name: Install Android SDK
        run: |
          sudo apt-get install -y android-sdk
          export ANDROIDSDK="/usr/lib/android-sdk"
          export ANDROIDNDK="/usr/lib/android-sdk/ndk"
          export ANDROIDAPI="33"
          export ANDROIDMINAPI="21"
      
      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.36
      
      - name: Build Debug APK
        run: |
          export ANDROIDSDK="/usr/lib/android-sdk"
          buildozer android debug
        timeout-minutes: 60
        env:
          ANDROIDSDK: /usr/lib/android-sdk
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-reader-debug-apk
          path: bin/*.apk
          retention-days: 30