name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip git openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libbz2-dev libreadline-dev \
            libsqlite3-dev liblzma-dev \
            libgl1-mesa-dev libx11-dev libxext-dev libxrender-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            libfreetype6-dev libfontconfig1-dev
      
      - name: Install Buildozer and dependencies
        run: |
          pip install buildozer cython==0.29.36
      
      - name: Cache buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r*
            ~/.gradle
          key: ${{ runner.os }}-buildozer-sdk-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-sdk-
      
      - name: Pre-install Android SDK and accept licenses
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          
          # 如果 SDK 已存在（缓存命中），跳过安装
          if [ -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "=== Android SDK already exists, skipping installation ==="
          else
            echo "=== Installing Android SDK ==="
            # 创建必要的目录
            mkdir -p $SDK_DIR/cmdline-tools
            mkdir -p $SDK_DIR/tools/bin
            
            # 下载并安装 Android SDK 命令行工具
            cd /tmp
            rm -rf commandlinetools-linux-8512546_latest.zip cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip
            unzip -q commandlinetools-linux-8512546_latest.zip
            mkdir -p $SDK_DIR/cmdline-tools/latest
            mv cmdline-tools/* $SDK_DIR/cmdline-tools/latest/
            rm -rf commandlinetools-linux-8512546_latest.zip cmdline-tools
          fi
          
          # 创建旧版 tools/bin/sdkmanager（buildozer 硬编码了这个路径）
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager || true
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/avdmanager $SDK_DIR/tools/bin/avdmanager || true
          
          # 验证符号链接
          echo "=== Verify sdkmanager ==="
          ls -la $SDK_DIR/tools/bin/sdkmanager || true
          $SDK_DIR/tools/bin/sdkmanager --version || true
          
          # 设置环境变量
          export ANDROID_HOME=$SDK_DIR
          export PATH=$PATH:$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/tools/bin
          
          # 接受所有许可证
          yes | sdkmanager --licenses || true
          
          # 安装必要的组件
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0" || true
      
      - name: Build APK
        run: |
          # 清除之前的构建缓存（避免缓存问题）
          rm -rf .buildozer/android/app/build
          rm -rf .buildozer/android/platform/build-*
          
          # 运行 buildozer
          buildozer android debug 2>&1 | tee build_log.txt
          
          # 显示构建结果
          echo "=== Build result ==="
          echo "=== Check bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ not found"
          echo "=== Check .buildozer/android/app/build/outputs ==="
          ls -la .buildozer/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "app/build/outputs not found"
          echo "=== Check platform build ==="
          find .buildozer/android/platform -name "*.apk" 2>/dev/null || echo "No APK in platform"
          echo "=== Gradle build log (last 50 lines) ==="
          tail -50 build_log.txt
        timeout-minutes: 120
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROID_HOME: ~/.buildozer/android/platform/android-sdk
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7
      
      - name: Find and copy APK
        run: |
          echo "=== Searching for APK files ==="
          find /home/runner -name "*.apk" -type f 2>/dev/null
          
          # 创建 bin 目录
          mkdir -p bin
          
          # 查找并复制 APK 到 bin 目录
          APK_FILE=$(find /home/runner -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Found APK: $APK_FILE"
            cp "$APK_FILE" bin/
            echo "Copied to bin/"
          else
            echo "WARNING: No APK found, uploading .buildozer for debug"
            # 列出 .buildozer 结构
            find .buildozer -maxdepth 4 -type d 2>/dev/null | head -30
          fi
          
          ls -la bin/
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-reader-debug-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error