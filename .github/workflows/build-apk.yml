name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip git openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libbz2-dev libreadline-dev \
            libsqlite3-dev liblzma-dev \
            libgl1-mesa-dev libx11-dev libxext-dev libxrender-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            libfreetype6-dev libfontconfig1-dev
      
      - name: Install Buildozer and dependencies
        run: |
          pip install buildozer cython==0.29.36
      
      - name: Cache buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      
      - name: Pre-install Android SDK and accept licenses
        run: |
          # 创建必要的目录
          mkdir -p ~/.buildozer/android/platform
          
          # 下载并安装 Android SDK 命令行工具
          cd ~/.buildozer/android/platform
          if [ ! -d "android-sdk" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip
            unzip -q commandlinetools-linux-8512546_latest.zip
            mkdir -p android-sdk/cmdline-tools
            mv cmdline-tools android-sdk/cmdline-tools/latest
            rm commandlinetools-linux-8512546_latest.zip
          fi
          
          # 设置环境变量
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # 接受所有许可证
          yes | sdkmanager --licenses || true
          
          # 安装必要的组件
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;23.2.8568313"
      
      - name: Build APK
        run: |
          buildozer android debug
        timeout-minutes: 120
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROID_HOME: ~/.buildozer/android/platform/android-sdk
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-reader-debug-apk
          path: bin/*.apk
          retention-days: 30